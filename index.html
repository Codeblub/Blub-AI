<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #sidebar { width: 260px; background: #f5f5f5; padding: 20px; border-right: 1px solid #ddd; }
        #main { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #ddd; }
        #input-area { padding: 20px; }
        #user-input { width: 80%; padding: 10px; }
    </style>
</head>
<body>
    <div id="sidebar"><h3>Blub-AI</h3><div id="history"></div></div>
    <div id="main">
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Message the AI...">
        </div>
    </div>
    <script src="app.js"></script>
</body>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<div id="g_id_onload"
     data-client_id="1215995692-onui8b2svri74b2omn0960lf70mlqbkb.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<script>
  function handleCredentialResponse(response) {
    // Decode the JWT (response.credential)
    const base64Url = response.credential.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));

    const userProfile = JSON.parse(jsonPayload);
    
    // This is the user's name from Google
    const username = userProfile.name; 
    console.log("Welcome, " + username);
  }
</script>
</html>
